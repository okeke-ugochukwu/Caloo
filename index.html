<!DOCTYPE html>
<html lang="en">
    <head>
        <title> App  </title> 

        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="img/favicon.png" type="image/png">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/normalize.css">
        <link rel="stylesheet" href="css/style.css">
            
        <meta name="description" content="Javascript Calculator">
        <meta name="keywords" content="Jascript, Calculator, App, WebApp, Okeke, Ugochukwu, okeke-ugochukwu, Github">
        <meta name="theme-color" content="#3C1687">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!--Open Graph data-->
        <meta property="og:locale" content="en_US"/>
        <meta property="og:type" content="website"/>
        <meta property="og:title" content="App"/>
        <meta property="og:description" content="Javascript Calculator"/>
        <meta property="og:url" content="https://okeke-ugochukwu.github.io/Caloo"/>
        <meta property="og:image" content="https://raw.githubusercontent.com/okeke-ugochukwu/Caloo/main/img/og-image.png"/>
        <meta property="og:image:width" content="1200"/>
        <meta property="og:image:height" content="600"/>
        <meta property="og:image:alt" content="| Website Image Snippet"/>
        <meta name="robots" content="follow, index">

        <!--Twitter Cards-->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="App">
        <meta name="creator" content="@pianomann_">
        <meta name="twitter:description" content="Javascript Calculator">
        <meta name="twitter:url" content="https://okeke-ugochukwu.github.io/Caloo/">
        <meta name="twitter:image" content="https://raw.githubusercontent.com/okeke-ugochukwu/Caloo/main/img/og-image.png">
        

        <script type="text/javascript" src="js/script.js"></script>
        <script type="text/javascript" src="js/jquery-3.5.1.min.js"></script>

    </head>
    <body>
        
        <div class="container">
            <div class="display">
                <div class="display-grid-item">
                    <div class="sub_display" id="active-calc">
                    </div>
                    <div class="sub_display" id="result">
                    </div>
                </div>
            </div>

            <div class="buttons">
                <div class="buttons-grid-box" id="grid-box-1">
                    <div class="buttons-grid-item"><input type="submit" value="C" id="reset"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&#37;"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&#247;"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&Cross;"></div>
                    <div class="buttons-grid-item"><input type="submit" value="7" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="8" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="9" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&minus;"></div>
                    <div class="buttons-grid-item"><input type="submit" value="4" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="5" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="6" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&plus;"></div>
                    <div class="buttons-grid-item"><input type="submit" value="1" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="2" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="3" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&lt;"></div>
                    <div class="buttons-grid-item"><div class="number" id="special" >S</div></div>
                    <div class="buttons-grid-item"><input type="submit" value="0" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="." class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="&#61;" id="equals-sign"></div>
                </div>

                <div class="buttons-grid-box" id="grid-box-2">
                    <div class="buttons-grid-item"><input type="submit" value="-" id="reset"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-"></div>
                    <div class="buttons-grid-item"><div class="number" id="special-2">-</div></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" class="number"></div>
                    <div class="buttons-grid-item"><input type="submit" value="-" id="equals-sign"></div>
                </div>
            </div>
        </div>
        <script type="text/javascript" src="js/script.js"></script>
    </body>
</html>
